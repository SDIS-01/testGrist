<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

<style>
body{font-family:sans-serif;margin:0}
#controls{padding:6px;background:#f4f4f4;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
#gantt-container{overflow-x:auto;position:relative;}

#gantt-table{
    border-collapse:collapse;
    table-layout:fixed;
}

#gantt-table td{
    border:1px solid #ddd;
    height:26px;
    text-align:center;
    vertical-align:middle;
    width:80px;
    font-size:11px;
    line-height:1.2;
}

.task-cell{color:white;border-radius:4px;padding:3px;font-size:11px;box-sizing:border-box;}

/* Jalons */
.jalon-cell { position: relative; height: 26px; text-align: center; vertical-align: middle; }
.jalon-cell div:last-child { width:14px; height:14px; transform:rotate(45deg); margin:auto; margin-top:4px; }

.day-label{
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-size:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100%;
    padding-left:2px;
    padding-right:2px;
}

.weekend{background:#fafafa;}

/* Ligne aujourd'hui */
.today-line {
    position:absolute;
    top:0;
    bottom:0;
    width:2px;
    background:red;
    pointer-events:none;
    z-index:10;
}

/* Bouton config */
#configBtn{
    cursor:pointer;
    border:1px solid #ccc;
    background:#fff;
    border-radius:4px;
    padding:4px 10px;
    font-size:12px;
}
#configBtn:hover{background:#eee;}

/* Filtre */
#filterControls{
    display:none;
    align-items:center;
    gap:6px;
}
#filterSelect{
    padding:3px 6px;
    font-size:12px;
    border:1px solid #ccc;
    border-radius:4px;
    max-width:220px;
}

/* Panneau config */
#configPanel{
    display:none;
    position:absolute;
    top:40px;
    left:6px;
    z-index:200;
    background:#fff;
    border:1px solid #ccc;
    border-radius:6px;
    box-shadow:0 4px 16px rgba(0,0,0,.18);
    padding:14px;
    width:520px;
    max-width:90vw;
}
#configPanel h3{margin:0 0 10px 0;font-size:14px;}
#configRows{max-height:260px;overflow-y:auto;margin-bottom:8px;}
.config-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.config-row input[type=text]{flex:1;padding:4px 6px;font-size:12px;border:1px solid #ccc;border-radius:3px;}
.config-row input[type=color]{width:34px;height:28px;border:none;padding:0;cursor:pointer;}
.cfg-remove{cursor:pointer;border:none;background:none;color:#c0392b;font-size:15px;padding:2px 6px;}
.cfg-remove:hover{background:#fdecea;border-radius:3px;}
#addRow{margin-bottom:10px;font-size:12px;padding:4px 8px;border:1px dashed #999;background:#fafafa;border-radius:4px;cursor:pointer;}
#addRow:hover{background:#f0f0f0;}
.config-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;border-top:1px solid #eee;padding-top:10px;}
.config-hint{font-size:11px;color:#888;margin-bottom:8px;}
#saveConfig{background:#2e7d32;color:white;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;}
#cancelConfig{background:none;border:1px solid #ccc;padding:6px 14px;border-radius:4px;cursor:pointer;}

/* Legende */
#legend{display:flex;gap:12px;flex-wrap:wrap;padding:6px 10px;font-size:11px;color:#333;}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-swatch{width:12px;height:12px;border-radius:3px;display:inline-block;}
</style>
</head>

<body>

<div id="controls">
  <span>
    Echelle :
    <select id="scale">
      <option value="year">Année</option>
      <option value="quarter">Trimestre</option>
      <option value="month" selected>Mois</option>
      <option value="week">Semaine</option>
      <option value="day">Jour</option>
    </select>
  </span>

  <label>
    <input type="checkbox" id="todayHighlight">
    Aujourd'hui
  </label>

  <span id="filterControls">
    Filtrer :
    <select id="filterSelect">
      <option value="">Tous</option>
    </select>
  </span>

  <button id="configBtn" type="button">⚙ Statuts &amp; couleurs</button>
</div>

<div id="configPanel">
  <h3>Configuration des statuts</h3>
  <div class="config-hint">
    Chaque ligne définit un texte à repérer dans la colonne "Etat" (insensible à la casse).
    Laissez le champ "texte à repérer" vide pour créer le statut par défaut (utilisé quand aucune règle ne correspond).
  </div>
  <div id="configRows"></div>
  <button id="addRow" type="button">+ Ajouter un statut</button>

  <div>
    <label style="font-size:12px;">
      Couleur des jalons :
      <input type="color" id="milestoneColorInput">
    </label>
  </div>

  <div class="config-footer">
    <button id="resetConfig" type="button" style="background:none;border:none;color:#888;font-size:11px;cursor:pointer;text-decoration:underline;">Réinitialiser les valeurs par défaut</button>
    <div>
      <button id="cancelConfig" type="button">Fermer</button>
      <button id="saveConfig" type="button">Enregistrer</button>
    </div>
  </div>
</div>

<div id="gantt-container">
<table id="gantt-table"></table>
<div id="today-line" class="today-line" style="display:none;"></div>
</div>

<div id="legend"></div>

<script>
grist.ready({
requiredAccess:'read table',
columns:[
{name:'task',title:'Nom de la tâche ou jalon'},
{name:'start',title:'Date de début'},
{name:'end',title:'Date de fin'},
{name:'jalon',title:'Est un Jalon', optional:true},
{name:'state',title:'Etat', optional:true},
{name:'filterField',title:'Champ de filtre (optionnel)', optional:true}
]
})

let scale="month"
let currentRecords=[]
let currentMappings={}
let highlightToday=false
let selectedFilterValue=""

// ===== CONFIGURATION DES STATUTS (personnalisable) =====
const defaultStateConfig = [
    {match:"1-", label:"À faire",        color:"#2e7d32"},
    {match:"2-", label:"En cours",       color:"#1e88e5"},
    {match:"3-", label:"En validation",  color:"#fb8c00"},
    {match:"",   label:"Terminé",        color:"#757575"}
]
let stateConfig = JSON.parse(JSON.stringify(defaultStateConfig))
let milestoneColor = "#e74c3c"

document.getElementById("scale").onchange = e=>{
    scale = e.target.value
    draw(currentRecords,currentMappings)
}

document.getElementById("todayHighlight").onchange = e=>{
    highlightToday = e.target.checked
    draw(currentRecords,currentMappings)
}

// ===== Gestion du filtre =====
document.getElementById("filterSelect").onchange = e=>{
    selectedFilterValue = e.target.value
    grist.setOption("selectedFilterValue", selectedFilterValue)
    draw(currentRecords, currentMappings)
}

// ===== Gestion du panneau de configuration =====
const configPanel = document.getElementById("configPanel")
const configRowsEl = document.getElementById("configRows")

document.getElementById("configBtn").onclick = ()=>{
    renderConfigRows(stateConfig)
    document.getElementById("milestoneColorInput").value = milestoneColor
    configPanel.style.display = "block"
}

document.getElementById("cancelConfig").onclick = ()=>{
    configPanel.style.display = "none"
}

document.getElementById("addRow").onclick = ()=>{
    addConfigRow({match:"", label:"", color:"#607d8b"})
}

document.getElementById("resetConfig").onclick = ()=>{
    renderConfigRows(JSON.parse(JSON.stringify(defaultStateConfig)))
    document.getElementById("milestoneColorInput").value = "#e74c3c"
}

document.getElementById("saveConfig").onclick = ()=>{
    stateConfig = collectConfigFromRows()
    milestoneColor = document.getElementById("milestoneColorInput").value
    grist.setOption("taskStates", stateConfig)
    grist.setOption("milestoneColor", milestoneColor)
    configPanel.style.display = "none"
    draw(currentRecords, currentMappings)
}

function renderConfigRows(config){
    configRowsEl.innerHTML = ""
    config.forEach(rule=>addConfigRow(rule))
}

function addConfigRow(rule){
    const row = document.createElement("div")
    row.className = "config-row"
    row.innerHTML = `
        <input type="text" class="cfg-match" placeholder="Texte à repérer (vide = défaut)" value="${escapeAttr(rule.match||"")}">
        <input type="text" class="cfg-label" placeholder="Libellé (légende)" value="${escapeAttr(rule.label||"")}">
        <input type="color" class="cfg-color" value="${rule.color||"#607d8b"}">
        <button type="button" class="cfg-remove" title="Supprimer">✕</button>
    `
    row.querySelector(".cfg-remove").onclick = ()=> row.remove()
    configRowsEl.appendChild(row)
}

function collectConfigFromRows(){
    const rows = configRowsEl.querySelectorAll(".config-row")
    const result = []
    rows.forEach(row=>{
        result.push({
            match: row.querySelector(".cfg-match").value.trim(),
            label: row.querySelector(".cfg-label").value.trim(),
            color: row.querySelector(".cfg-color").value
        })
    })
    return result
}

function escapeAttr(s){
    return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;")
}

function escapeHtml(s){
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
}

// Charge la config sauvegardée dans le document Grist (par widget)
grist.onOptions((options)=>{
    if(options){
        if(Array.isArray(options.taskStates) && options.taskStates.length>0){
            stateConfig = options.taskStates
        }
        if(options.milestoneColor){
            milestoneColor = options.milestoneColor
        }
        if(typeof options.selectedFilterValue === "string"){
            selectedFilterValue = options.selectedFilterValue
        }
    }
    draw(currentRecords, currentMappings)
})

function parseDate(v){
    if(!v) return null
    if(typeof v==="number"){ if(v<10000000000)v*=1000; return new Date(v) }
    let d = new Date(v)
    return isNaN(d)?null:d
}

function getWeekNumber(d){
    const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const dayNum = date.getUTCDay() || 7;
    date.setUTCDate(date.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
    return Math.ceil((((date - yearStart) / 86400000) + 1)/7);
}

function getMonday(d){
    let date = new Date(d)
    let day = date.getDay()
    let diff = (day===0?-6:1)-day
    date.setDate(date.getDate() + diff)
    date.setHours(0,0,0,0)
    return date
}

function generateUnits(min,max){
    let units=[],current=new Date(min)
    while(current<=max){
        let label="",next,y=current.getFullYear(),m=current.getMonth()

        if(scale==="year"){
            label=y;
            next=new Date(y+1,0,1);
        }
        else if(scale==="quarter"){
            let q=Math.floor(m/3)+1;
            label="T"+q+" "+y;
            next=new Date(y,q*3,1);
        }
        else if(scale==="month"){
            label=current.toLocaleString("fr-FR",{month:"long",year:"numeric"});
            next=new Date(y,m+1,1);
        }
        else if(scale==="week"){
            let monday = getMonday(current);
            let weekNum = getWeekNumber(monday);
            let day = String(monday.getDate()).padStart(2,'0');
            let month = String(monday.getMonth()+1).padStart(2,'0');
            label = `S${weekNum}<br>${day}/${month}`;
            next = new Date(monday);
            next.setDate(next.getDate()+7);
            current = monday;
        }
        else if(scale==="day"){
            let shortYear = String(y).slice(-2);
            // Ajouter &nbsp; pour ne pas coller aux bords
            label = `&nbsp;${String(current.getDate()).padStart(2,'0')}/${String(m+1).padStart(2,'0')}/${shortYear}&nbsp;`;
            next = new Date(y,m,current.getDate()+1);
        }

        units.push({date:new Date(current),label})
        current=next
    }
    return units
}

function findCol(units,date){
    if(!date)return 0;
    for(let i=0;i<units.length;i++){
        let start=units[i].date;
        let end=(i+1<units.length)?units[i+1].date:new Date(8640000000000000);
        if(date>=start && date<end)return i;
    }
    return units.length-1;
}

function countCols(units,start,end){
    return findCol(units,end)-findCol(units,start)+1;
}

// Retourne la règle de statut (label + couleur) correspondant à l'état d'une tâche
function stateRule(state){
    let s = (state||"").toLowerCase();
    for(const rule of stateConfig){
        if(rule.match && s.includes(rule.match.toLowerCase())) return rule;
    }
    // Règle par défaut : celle dont "match" est vide
    let def = stateConfig.find(r=>!r.match);
    if(def) return def;
    return {label: state||"Terminé", color:"#757575"};
}

// Convertit une valeur brute Grist (choix, ref, liste...) en texte affichable
function displayValue(v){
    if(v===null || v===undefined) return ""
    if(Array.isArray(v)){
        // Ex: ['L', 'val1', 'val2'] (liste Grist) -> on ignore le marqueur 'L'
        let arr = v[0]==='L' ? v.slice(1) : v
        return arr.map(displayValue).join(", ")
    }
    if(typeof v === "object"){
        if('value' in v) return displayValue(v.value)
        return JSON.stringify(v)
    }
    return String(v)
}

function updateFilterUI(allRecords, mappings){
    const filterControls = document.getElementById("filterControls")
    const filterSelect = document.getElementById("filterSelect")

    if(!mappings.filterField){
        filterControls.style.display = "none"
        return
    }

    filterControls.style.display = "inline-flex"

    // Valeurs distinctes présentes dans la colonne de filtre
    let values = [...new Set(
        allRecords
            .map(r=>displayValue(r[mappings.filterField]))
            .filter(v=>v!=="")
    )].sort((a,b)=>a.localeCompare(b,'fr',{sensitivity:'base'}))

    let html = `<option value="">Tous</option>`
    values.forEach(v=>{
        html += `<option value="${escapeAttr(v)}">${escapeHtml(v)}</option>`
    })
    filterSelect.innerHTML = html

    // Si la valeur mémorisée n'existe plus parmi les valeurs actuelles, on revient à "Tous"
    if(selectedFilterValue && !values.includes(selectedFilterValue)){
        selectedFilterValue = ""
        grist.setOption("selectedFilterValue", "")
    }
    filterSelect.value = selectedFilterValue
}

function applyFilter(records, mappings){
    if(!mappings.filterField || !selectedFilterValue) return records
    return records.filter(r => displayValue(r[mappings.filterField]) === selectedFilterValue)
}

function draw(records,mappings){
    currentRecords = records;
    currentMappings = mappings;

    if(!records || records.length===0) return

    updateFilterUI(records, mappings)
    let visibleRecords = applyFilter(records, mappings)

    let dates=[]
    visibleRecords.forEach(r=>{
        let s=parseDate(r[mappings.start]), e=parseDate(r[mappings.end]);
        if(r[mappings.jalon]){
            if(s) dates.push(s)
        }else{
            if(s) dates.push(s)
            if(e) dates.push(e)
        }
    })

    if(dates.length===0){
        document.getElementById("gantt-table").innerHTML = ""
        renderLegend()
        document.getElementById("today-line").style.display = "none"
        return
    }

    let min=new Date(Math.min(...dates))
    let max=new Date(Math.max(...dates))
    min.setHours(0,0,0,0)
    max.setHours(0,0,0,0)

    let units=generateUnits(min,max)
    let html=""

    // HEADER
    html+="<tr>"
    units.forEach(u=>{
        html+=`<td>${u.label}</td>`
    })
    html+="</tr>"

    // ROWS
    visibleRecords.forEach(r=>{
        html+="<tr>"
        let s=parseDate(r[mappings.start]), e=parseDate(r[mappings.end])
        let isJalon=r[mappings.jalon]

        if(isJalon){
            let col=findCol(units,s||e)
            for(let i=0;i<units.length;i++){
                if(i===col){
                    html+=`<td class="jalon-cell"><div>${r[mappings.task]||""}</div><div style="background:${milestoneColor}"></div></td>`
                } else html+="<td></td>"
            }
        } else {
            let startCol=findCol(units,s)
            let colspan=countCols(units,s,e)
            let rule = stateRule(r[mappings.state])

            for(let i=0;i<startCol;i++) html+="<td></td>"

            html+=`<td colspan="${colspan}">
                    <div class="task-cell" style="background:${rule.color}">
                    ${r[mappings.task]||""}
                    </div>
                  </td>`

            for(let i=startCol+colspan;i<units.length;i++) html+="<td></td>"
        }

        html+="</tr>"
    })

    document.getElementById("gantt-table").innerHTML=html
    renderLegend()

    // ===== LIGNE AUJOURD'HUI =====
    let line=document.getElementById("today-line")

    if(!highlightToday){
        line.style.display = "none"
        return
    }

    let today = new Date()
    today.setHours(0,0,0,0)

    let col = findCol(units, today)

    // Ratio selon échelle
    let ratio;
    if(scale === "year"){
        let yearStart = new Date(today.getFullYear(),0,1);
        let yearEnd = new Date(today.getFullYear()+1,0,1);
        let dayOfYear = Math.floor((today - yearStart)/86400000);
        let totalDays = Math.floor((yearEnd - yearStart)/86400000);
        ratio = dayOfYear / totalDays;
    } else if(scale === "day"){
        ratio = 0.5;  // centré dans la cellule
    } else {
        let start = units[col].date
        let end = (col+1<units.length)?units[col+1].date:new Date(start.getTime()+86400000)
        ratio = (today - start) / (end - start)
    }
    ratio = Math.max(0, Math.min(1, ratio))

    // Position réelle
    let table = document.getElementById("gantt-table")
    let cell = table.rows[0].cells[col]
    let realWidth = cell.getBoundingClientRect().width
    let left = cell.offsetLeft + ratio * realWidth

    line.style.left = left + "px"
    line.style.display = "block"

    // Scroll automatique
    document.getElementById("gantt-container").scrollLeft = left - 200
}

function renderLegend(){
    const legend = document.getElementById("legend")
    let html = ""
    stateConfig.forEach(rule=>{
        let label = rule.label && rule.label.trim() !== "" ? rule.label : (rule.match || "Autre")
        html += `<span class="legend-item"><span class="legend-swatch" style="background:${rule.color}"></span>${label}</span>`
    })
    html += `<span class="legend-item"><span class="legend-swatch" style="background:${milestoneColor};transform:rotate(45deg);"></span>Jalon</span>`
    legend.innerHTML = html
}

grist.onRecords((r,m)=>draw(r,m))
</script>
</body>
</html>
